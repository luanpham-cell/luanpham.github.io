<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Trại Gà Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32; --accent: #f9a825; --danger: #d32f2f;
            --danger-bg: #ffebee; --bg: #f4f7f6; --text: #333;
        }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text); padding-bottom: 60px; }
        header {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white; text-align: center; padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nav-tabs { display: flex; justify-content: center; background: #fff; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn {
            padding: 15px 20px; border: none; background: none; font-size: 1em; font-weight: bold;
            cursor: pointer; color: #666; border-bottom: 4px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; max-width: 1100px; margin: 25px auto; padding: 0 15px; }
        .tab-content.active { display: block; }

        /* Style cho phần Quản lý */
        .admin-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .admin-box h2 { margin-top: 0; color: var(--primary); font-size: 1.3em; border-left: 5px solid var(--primary); padding-left: 10px; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-item { display: flex; flex-direction: column; }
        .form-item label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }
        
        .submit-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .calc-preview { background: #fffde7; padding: 15px; border-radius: 8px; border: 1px dashed var(--accent); margin: 10px 0; font-weight: bold; text-align: center; }

        /* Bảng dữ liệu */
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.95em; }
        th { background: #f8f9fa; }
        .row-debt { background-color: var(--danger-bg); color: var(--danger); font-weight: bold; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.8em; color: white; font-weight: bold; }
        .bg-paid { background: var(--primary); }
        .bg-debt { background: var(--danger); }

        /* Store Cards */
        .grid-layout { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: white; border-radius: 20px; padding: 20px; width: 280px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .price-tag { color: var(--danger); font-size: 1.4em; font-weight: 900; margin: 10px 0; }
        
        .del-btn { background: #ffeded; color: #d32f2f; border: 1px solid #ffcdd2; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }
        .status-btn { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }
    </style>
</head>
<body>

    <header>
        <h1>🐔 Trại Gà Hạnh Phúc</h1>
        <p>Hệ thống Quản lý Bán lẻ & Công nợ</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('shop')">🏠 Cửa Hàng</button>
        <button class="tab-btn" onclick="switchTab('admin')">📋 Giao Hàng & Nợ</button>
        <button class="tab-btn" onclick="switchTab('settings')">⚙️ Cấu Hình Gà</button>
    </div>

    <div id="tab-shop" class="tab-content active">
        <div id="shop-list" class="grid-layout">
            </div>
    </div>

    <div id="tab-admin" class="tab-content">
        <div class="admin-box">
            <h2>📝 Lên Lịch Giao Hàng</h2>
            <form onsubmit="saveOrder(event)">
                <div class="form-group">
                    <div class="form-item">
                        <label>Tên Khách Hàng:</label>
                        <input type="text" id="order-cust" required placeholder="Ví dụ: Chú Bảy">
                    </div>
                    <div class="form-item">
                        <label>Ngày Giao:</label>
                        <input type="date" id="order-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-item">
                        <label>Chọn Loại Gà:</label>
                        <select id="order-type" onchange="updateUnitDisplay()"></select>
                    </div>
                    <div class="form-item">
                        <label id="label-qty">Số lượng (Con):</label>
                        <input type="number" id="order-qty" step="0.1" value="1" oninput="calculateTotal()">
                    </div>
                    <div class="form-item">
                        <label>Thanh Toán:</label>
                        <select id="order-status">
                            <option value="paid">Đã trả tiền đủ</option>
                            <option value="debt">Ghi nợ (Chưa trả)</option>
                        </select>
                    </div>
                </div>
                <div class="calc-preview" id="order-preview">TỔNG TIỀN: 0đ</div>
                <button type="submit" class="submit-btn">💾 Lưu Đơn Giao Hàng</button>
            </form>
        </div>

        <div class="admin-box">
            <h2>📊 Danh Sách Giao Hàng & Nợ</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Khách Hàng</th>
                            <th>Mặt Hàng</th>
                            <th>SL</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th>Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="order-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-settings" class="tab-content">
        <div class="admin-box">
            <h2>➕ Thêm Loại Gà / Mặt Hàng Mới</h2>
            <form onsubmit="addItem(event)">
                <div class="form-group">
                    <div class="form-item">
                        <label>Tên Mặt Hàng:</label>
                        <input type="text" id="new-item-name" required placeholder="Gà Tre, Gà Nòi...">
                    </div>
                    <div class="form-item">
                        <label>Đơn Vị Tính:</label>
                        <select id="new-item-unit">
                            <option value="Con">Tính theo Con</option>
                            <option value="Kg">Tính theo Kg</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label>Giá Bán (VNĐ):</label>
                        <input type="number" id="new-item-price" required placeholder="Ví dụ: 150000">
                    </div>
                </div>
                <button type="submit" class="submit-btn" style="background:var(--accent)">➕ Thêm Vào Danh Mục</button>
            </form>
        </div>

        <div class="admin-box">
            <h2>Danh Mục Hiện Tại</h2>
            <table id="settings-table">
                <thead>
                    <tr>
                        <th>Tên Mặt Hàng</th>
                        <th>Đơn Vị</th>
                        <th>Giá</th>
                        <th>Hành Động</th>
                    </tr>
                </thead>
                <tbody id="settings-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Dữ liệu ban đầu
        let items = JSON.parse(localStorage.getItem('chickenItems')) || [
            { id: 1, name: "Gà Ta", unit: "Kg", price: 150000 },
            { id: 2, name: "Gà Ác", unit: "Con", price: 80000 }
        ];
        let orders = JSON.parse(localStorage.getItem('chickenOrders')) || [];

        // Chuyển Tab
        function switchTab(t) {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${t}')"]`).classList.add('active');
            document.getElementById(`tab-${t}`).classList.add('active');
            if(t === 'admin') renderOrders();
            if(t === 'settings') renderSettings();
            if(t === 'shop') renderShop();
        }

        // CẤU HÌNH: Thêm loại gà mới
        function addItem(e) {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                name: document.getElementById('new-item-name').value,
                unit: document.getElementById('new-item-unit').value,
                price: parseInt(document.getElementById('new-item-price').value)
            };
            items.push(newItem);
            localStorage.setItem('chickenItems', JSON.stringify(items));
            e.target.reset();
            renderSettings();
            updateOrderOptions();
            alert("Đã thêm loại gà mới!");
        }

        function deleteItem(id) {
            if(confirm("Xóa loại gà này?")) {
                items = items.filter(i => i.id !== id);
                localStorage.setItem('chickenItems', JSON.stringify(items));
                renderSettings();
                updateOrderOptions();
            }
        }

        function renderSettings() {
            const body = document.getElementById('settings-table-body');
            body.innerHTML = items.map(i => `
                <tr>
                    <td><strong>${i.name}</strong></td>
                    <td>${i.unit}</td>
                    <td>${i.price.toLocaleString()}đ</td>
                    <td><button class="del-btn" onclick="deleteItem(${i.id})">Xóa</button></td>
                </tr>
            `).join('');
        }

        // QUẢN LÝ ĐƠN HÀNG
        function updateOrderOptions() {
            const select = document.getElementById('order-type');
            select.innerHTML = items.map(i => `<option value="${i.id}">${i.name} (${i.price.toLocaleString()}đ/${i.unit})</option>`).join('');
            updateUnitDisplay();
        }

        function updateUnitDisplay() {
            const itemId = document.getElementById('order-type').value;
            const item = items.find(i => i.id == itemId);
            if(item) {
                document.getElementById('label-qty').innerText = `Số lượng (${item.unit}):`;
            }
            calculateTotal();
        }

        function calculateTotal() {
            const itemId = document.getElementById('order-type').value;
            const qty = parseFloat(document.getElementById('order-qty').value) || 0;
            const item = items.find(i => i.id == itemId);
            const total = item ? item.price * qty : 0;
            document.getElementById('order-preview').innerText = `TỔNG TIỀN: ${total.toLocaleString()}đ`;
        }

        function saveOrder(e) {
            e.preventDefault();
            const itemId = document.getElementById('order-type').value;
            const item = items.find(i => i.id == itemId);
            const qty = parseFloat(document.getElementById('order-qty').value);
            
            const newOrder = {
                id: Date.now(),
                date: document.getElementById('order-date').value,
                customer: document.getElementById('order-cust').value,
                itemName: item.name,
                unit: item.unit,
                qty: qty,
                total: item.price * qty,
                status: document.getElementById('order-status').value
            };
            orders.push(newOrder);
            localStorage.setItem('chickenOrders', JSON.stringify(orders));
            renderOrders();
            alert("Đã lưu đơn giao hàng!");
        }

        function toggleOrder(id) {
            orders = orders.map(o => {
                if(o.id === id) o.status = o.status === 'paid' ? 'debt' : 'paid';
                return o;
            });
            localStorage.setItem('chickenOrders', JSON.stringify(orders));
            renderOrders();
        }

        function deleteOrder(id) {
            if(confirm("Xóa lịch sử giao này?")) {
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('chickenOrders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function renderOrders() {
            const body = document.getElementById('order-table-body');
            orders.sort((a,b) => new Date(b.date) - new Date(a.date));
            body.innerHTML = orders.map(o => `
                <tr class="${o.status === 'debt' ? 'row-debt' : ''}">
                    <td>${o.date.split('-').reverse().join('/')}</td>
                    <td>${o.customer}</td>
                    <td>${o.itemName}</td>
                    <td>${o.qty} ${o.unit}</td>
                    <td>${o.total.toLocaleString()}đ</td>
                    <td>
                        <span class="badge ${o.status === 'paid' ? 'bg-paid' : 'bg-debt'}" onclick="toggleOrder(${o.id})" style="cursor:pointer">
                            ${o.status === 'paid' ? 'Đã trả' : 'CÒN NỢ'}
                        </span>
                    </td>
                    <td><button class="del-btn" onclick="deleteOrder(${o.id})">x</button></td>
                </tr>
            `).join('');
        }

        // CỬA HÀNG
        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = items.map(i => `
                <div class="card">
                    <div style="font-size:3em">${i.unit === 'Con' ? '🐥' : '🐓'}</div>
                    <h3>${i.name}</h3>
                    <div class="price-tag">${i.price.toLocaleString()}đ <small style="font-size:0.5em">/${i.unit}</small></div>
                    <button class="submit-btn" style="width:100%" onclick="alert('Vui lòng gọi chủ trại để đặt gà!')">Liên Hệ Đặt Gà</button>
                </div>
            `).join('');
        }

        // Khởi tạo
        document.getElementById('order-date').value = new Date().toISOString().split('T')[0];
        updateOrderOptions();
        renderShop();
    </script>
</body>
</html>
